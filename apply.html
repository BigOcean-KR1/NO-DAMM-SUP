<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지원하기 | 2026 노담 서포터즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="icon" href="Picture/favicon_io/favicon.ico" type="image/x-icon">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-pale: #d8f3dc;
      --bg: #f8faf8;
      --surface: #ffffff;
      --border: #e0e7e3;
      --text: #1a2e22;
      --muted: #6b7c72;
      --radius: 12px;
      --radius-lg: 20px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--green);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    .header-logo img {
      height: 36px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      cursor: pointer;
      background: none;
      border: none;
    }

    .back-btn:hover {
      color: var(--green);
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .apply-wrap {
      width: 100%;
      max-width: 640px;
    }

    /* ── Hero 배너 ── */
    .apply-banner {
      background: linear-gradient(135deg, var(--green) 0%, #1b4332 100%);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      margin-bottom: 2rem;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .apply-banner::before {
      content: 'NODAM';
      position: absolute;
      right: -10px;
      bottom: -20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7rem;
      color: rgba(255, 255, 255, 0.07);
      line-height: 1;
      pointer-events: none;
    }

    .apply-banner .tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .apply-banner h1 {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }

    .apply-banner p {
      font-size: 14px;
      opacity: 0.85;
    }

    /* ── Form card ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.2rem;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .required {
      color: #e74c3c;
      margin-left: 2px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(64, 145, 108, 0.12);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .submit-btn:hover {
      background: var(--green-light);
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .submit-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* ── 완료 화면 ── */
    .success-screen {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: var(--green-pale);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      color: var(--green);
    }

    .success-screen h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      color: var(--green);
    }

    .success-screen p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .close-btn {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 10px 24px;
      background: var(--green);
      color: #fff;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.2s;
    }

    .close-btn:hover {
      background: var(--green-light);
    }

    /* ── footer ── */
    .apply-footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .apply-banner h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <a class="header-logo" href="index.html">
      <img src="Picture/Nodamm_Mark.png" alt="노담 마크" onerror="this.style.display='none'">
      NODAM SUPPORTERS
    </a>
    <button class="back-btn" onclick="window.close()">
      <i class="ti ti-arrow-left"></i> 닫기
    </button>
  </header>

  <main>
    <div class="apply-wrap">

      <div class="apply-banner">
        <span class="tag">JOIN US · 2026</span>
        <h1>노담 서포터즈<br>지원하기</h1>
        <p>인천을 바꾸는 작은 발걸음, 지금 시작하세요 🌱</p>
      </div>

      <!-- 지원서 폼 -->
      <div class="form-card" id="formCard">
        <form id="applyForm">

          <div class="form-row">
            <div class="form-group">
              <label for="userName">이름 <span class="required">*</span></label>
              <input type="text" id="userName" placeholder="성함을 입력해주세요" autocomplete="name" required>
            </div>
            <div class="form-group">
              <label for="userAge">나이 <span class="required">*</span></label>
              <input type="number" id="userAge" placeholder="예: 22" min="14" max="99" autocomplete="off" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="userGender">성별 <span class="required">*</span></label>
              <select id="userGender" autocomplete="sex" required>
                <option value="" disabled selected>선택해주세요</option>
                <option value="남성">남성</option>
                <option value="여성">여성</option>
                <option value="기타">기타 / 선택 안 함</option>
              </select>
            </div>
            <div class="form-group">
              <label for="userSmoking">흡연 여부 <span class="required">*</span></label>
              <select id="userSmoking" autocomplete="off" required>
                <option value="" disabled selected>선택해주세요</option>
                <option value="비흡연">비흡연</option>
                <option value="흡연">흡연</option>
                <option value="금연중">금연 중</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="userArea">희망 활동 지역 <span class="required">*</span></label>
            <select id="userArea" autocomplete="off" required>
              <option value="전체">전체 (무관)</option>
              <option value="남동구">남동구</option>
              <option value="부평구">부평구</option>
              <option value="미추홀구">미추홀구</option>
              <option value="연수구">연수구</option>
              <option value="계양구">계양구</option>
              <option value="서구">서구</option>
              <option value="중구">중구</option>
              <option value="동구">동구</option>
              <option value="강화군">강화군</option>
              <option value="옹진군">옹진군</option>
            </select>
          </div>

          <hr class="divider">

          <div class="form-group">
            <label for="userMessage">지원 동기 <span style="color:var(--muted); font-weight:400;">(선택)</span></label>
            <textarea id="userMessage" placeholder="간단한 지원 동기를 적어주세요"></textarea>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <i class="ti ti-send"></i> 신청서 제출하기
          </button>

        </form>
      </div>

      <!-- 제출 완료 화면 -->
      <div class="success-screen" id="successScreen">
        <div class="success-icon"><i class="ti ti-check"></i></div>
        <h2>지원이 완료되었습니다!</h2>
        <p id="successMsg">확인 후 연락드리겠습니다.<br>함께해 주셔서 감사합니다 🌱</p>
        <button class="close-btn" onclick="window.close()">창 닫기</button>
      </div>

    </div>
  </main>

  <div class="apply-footer">© 2026 NODAM SUPPORTERS · 인천광역시</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDohqK6enK4y1RSjkYnDGlxtHb5eSo3TWs",
      authDomain: "no-damm-sup.firebaseapp.com",
      projectId: "no-damm-sup",
      storageBucket: "no-damm-sup.firebasestorage.app",
      messagingSenderId: "1072430359524",
      appId: "1:1072430359524:web:5bf91b96c3d907726a5df1",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('userName').value.trim();
      const age = document.getElementById('userAge').value.trim();
      const gender = document.getElementById('userGender').value;
      const smoking = document.getElementById('userSmoking').value;
      const area = document.getElementById('userArea').value;
      const message = document.getElementById('userMessage').value.trim();

      if (!name || !age || !gender || !smoking || !area) {
        alert('필수 항목(*)을 모두 입력해주세요.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> 제출 중...';

      try {
        await addDoc(collection(db, "applicants"), {
          name, age: Number(age), gender, smoking, area,
          message: message || '',
          date: new Date().toISOString(),
        });

        // 성공 화면 표시
        document.getElementById('formCard').style.display = 'none';
        const success = document.getElementById('successScreen');
        document.getElementById('successMsg').innerHTML =
          `<strong>${name}</strong>님의 지원이 접수되었습니다.<br>확인 후 연락드리겠습니다. 함께해 주셔서 감사합니다 🌱`;
        success.style.display = 'block';

      } catch (err) {
        console.error(err);
        alert('제출에 실패했습니다. 잠시 후 다시 시도해주세요.');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-send"></i> 신청서 제출하기';
      }
    });
  </script>

</body>

</html>
